<!DOCTYPE html>
<html lang="en" class="dark h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title if title else "Aura — AI Multi-Persona Platform" }}</title>
    
    <!-- Meta tags for SEO -->
    <meta name="description" content="A stateful, multi-persona voice AI platform. Talk to different personalities with persistent context memory.">
    <meta name="robots" content="index, follow">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f5ff',
                            100: '#e0ebff',
                            200: '#c7dcff',
                            300: '#9ec1ff',
                            400: '#6b9cff',
                            500: '#3b6eff',
                            600: '#254cff',
                            700: '#1d3aff',
                            800: '#1930d9',
                            900: '#1a2db3',
                            950: '#0a114d',
                        },
                    }
                }
            }
        }
    </script>
    
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"></script>
    
    <style>
        /* Custom scrollbar and glow effects */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.6);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.5);
        }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .glow-effect {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glow-effect:hover {
            box-shadow: 0 0 25px rgba(59, 110, 255, 0.2);
            border-color: rgba(59, 110, 255, 0.4);
            transform: translateY(-2px);
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="h-full flex flex-col font-sans overflow-x-hidden antialiased">
    <!-- Neon Accent Background Glows -->
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-brand-500/10 rounded-full blur-[120px] pointer-events-none -z-10"></div>
    <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-[120px] pointer-events-none -z-10"></div>

    <!-- Top Navigation Bar -->
    <nav class="glass-panel sticky top-0 z-50 border-b border-slate-800/80 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-600 to-purple-600 flex items-center justify-center shadow-lg shadow-brand-500/20">
                <i class="fa-solid fa-microphone-lines text-white text-lg"></i>
            </div>
            <div>
                <span class="font-outfit font-bold text-xl tracking-tight bg-gradient-to-r from-white via-slate-200 to-brand-400 bg-clip-text text-transparent">
                    AURA
                </span>
                <span class="text-xs block text-slate-400 font-mono tracking-widest -mt-1 uppercase">Personas</span>
            </div>
        </div>
        
        <!-- Navigation Links -->
        <div class="flex items-center gap-6">
            <a href="/" class="text-slate-200 hover:text-brand-400 font-medium transition-colors duration-200 flex items-center gap-2">
                <i class="fa-solid fa-gauge-high"></i> Dashboard
            </a>
            <a href="/panels" class="text-slate-400 hover:text-brand-400 font-medium transition-colors duration-200 flex items-center gap-2">
                <i class="fa-solid fa-users-rectangle"></i> Panels
            </a>
            <a href="/personas/new" class="text-slate-400 hover:text-brand-400 font-medium transition-colors duration-200 flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> Create Custom
            </a>
        </div>
        
        <!-- API Status / System Indicators -->
        <div class="flex items-center gap-3">
            <div class="px-3 py-1 rounded-full text-xs font-mono bg-slate-900 border border-slate-800 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span>System Online</span>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col p-6 max-w-7xl mx-auto w-full">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="mt-auto border-t border-slate-900/60 bg-slate-950/80 py-6 px-8 text-center text-sm text-slate-500">
        <p>&copy; 2026 Aura Persona Voice Agent Platform. Built with FastAPI + Jinja2 + HTMX.</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
