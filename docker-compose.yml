version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: personas-db
    restart: always
    environment:
      POSTGRES_USER: personas
      POSTGRES_PASSWORD: personas
      POSTGRES_DB: personas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
